dev_dependencies:
  flutter_test:
    sdk: flutter

  
  flutter_launcher_icons: ^0.13.1   # Use latest version
  # flutter_launcher_icons:
  # android: true
  # ios: true
  # image_path: "assets/icon/icon.png"   # Path to your icon (PNG, at least 1024x1024)
  # adaptive_icon_background: "#FFFFFF"  # Optional for Android adaptive icons
  # adaptive_icon_foreground: "assets/icon/icon_foreground.png" # Optional

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^4.0.0
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_background: "#1976D2"
  # adaptive_icon_foreground: "assets/icon/foreground.png"
  min_sdk_android: 21
